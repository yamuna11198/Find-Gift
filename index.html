<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
  .heart-beat {
    animation: beat 1s infinite;
  }

  @keyframes beat {
    0% { transform: scale(1); }
    25% { transform: scale(1.1); }
    40% { transform: scale(1); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .fade-out {
    animation: fadeOut 1s forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(1.2); }
  }
</style>
</head>

<body class="bg-black min-h-screen overflow-hidden flex items-center justify-center">

  <!-- Confetti Canvas -->
  <canvas id="confetti" class="fixed top-0 left-0 w-full h-full"></canvas>

  <!-- Music -->
  <audio id="bgMusic" loop>
    <source src="./music/teddy-bear.mp3" type="audio/mpeg">
  </audio>

  <!-- Intro Screen -->
  <div id="intro" 
       class="w-full h-screen flex flex-col items-center justify-center 
              text-center text-white px-6">

    <!-- Heart -->
    <div class="text-6xl sm:text-7xl md:text-8xl heart-beat mb-6 flex justify-center w-full">
      ❤️
    </div>

    <!-- Typing Text -->
    <h1 id="typingText" 
        class="text-lg sm:text-xl md:text-2xl font-semibold max-w-md mx-auto">
    </h1>

  </div>

<script>
  const music = document.getElementById("bgMusic");
  music.play();
  const text = "Booting Love System...";
  const typing = document.getElementById("typingText");
  const intro = document.getElementById("intro");
  let i = 0;

  function typeEffect() {
    if (i < text.length) {
      typing.innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 80);
    } else {
      setTimeout(secondLine, 1000);
    }
  }

  function secondLine() {
    typing.innerHTML = "Scanning Birthday Boy...";
    setTimeout(thirdLine, 1500);
  }

  function thirdLine() {
    typing.innerHTML = "Handsome Level: 100% 😎";
    setTimeout(finalLine, 1500);
  }

  function finalLine() {
    typing.innerHTML = "Accessing Surprise...";
    setTimeout(() => {
      intro.classList.add("fade-out");
      setTimeout(() => {
        window.location.href = "game.html"; // your treasure hunt page
      }, 1500);
    }, 1500);
  }

  typeEffect();
</script>

</body>
</html>
